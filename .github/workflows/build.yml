name: Build (Frontend + API + Docker)

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend:
    name: Build frontend + upload artifact
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  go:
    name: Build and test Go (uses frontend artifacts)
    needs: frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: pipelinemkv/static

      - name: Normalize frontend artifact layout
        run: |
          mkdir -p pipelinemkv/static
          mv pipelinemkv/static/frontend-dist/* pipelinemkv/static/ || true
          rm -rf pipelinemkv/static/frontend-dist

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.0'

      - name: Build
        working-directory: ./pipelinemkv
        run: go build -v -o pipelinemkv ./...

      - name: Test
        working-directory: ./pipelinemkv
        run: go test -v ./...

      - name: Upload Go executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-binary
          path: pipelinemkv/pipelinemkv

  docker:
    name: Build and push Docker image
    needs: go
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Go executable artifact
        uses: actions/download-artifact@v4
        with:
          name: go-binary
          path: pipelinemkv

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./pipelinemkv
          file: ./pipelinemkv/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/makemkv:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/makemkv:cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/makemkv:cache,mode=max
